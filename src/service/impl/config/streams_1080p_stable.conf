# rflow 1080p 稳态配置（与 streams.conf 的 720p 配置分离）
# 用法：
#   CONFIG_FILE=./config/streams_1080p_stable.conf ./scripts/push.sh livestream /dev/video11
#   CONFIG_FILE=./config/streams_1080p_stable.conf ./scripts/pull.sh --e2e /dev/video11
# 建议叠加（减少抖动）：E2E_PUSH_CORE=6 E2E_PULL_CORE=7 E2E_SCHED_MODE=nice

# --- 信令 ---
SIGNALING_ADDR=127.0.0.1:8765
START_SIGNALING=1
AUTO_LOCAL_ROUTE=1

# --- 视频 ---
WIDTH=1920
HEIGHT=1080
FPS=30

CAPTURE_WARMUP_SEC=0
CAPTURE_GATE_MIN_FRAMES=0
CAPTURE_GATE_MAX_WAIT_SEC=12

# 1080p 稳态优先：适当留码率余量，避免 encoder/pacer 尾部抬升。
BITRATE_MODE=vbr
TARGET_BITRATE=5600
MIN_BITRATE=3600
MAX_BITRATE=9000
DEGRADATION_PREFERENCE=maintain_framerate

ICE_PRIORITIZE_LIKELY_PAIRS=1
VIDEO_NETWORK_PRIORITY=high
VIDEO_ENCODING_MAX_FPS=0

USE_ROCKCHIP_MPP_H264=1
USE_ROCKCHIP_MPP_MJPEG_DECODE=1
USE_DUAL_MPP_MJPEG_H264=1

# 1080p 下队列/池略大，减少 decode/encode backpressure 抖动。
MJPEG_QUEUE_LATEST_ONLY=0
MJPEG_QUEUE_MAX=8
MJPEG_RGA_TO_MPP=0
V4L2_BUFFER_COUNT=9
V4L2_POLL_TIMEOUT_MS=8
NV12_POOL_SLOTS=10

VIDEO_CODEC=h264
H264_PROFILE=main
H264_LEVEL=4.1
KEYFRAME_INTERVAL=60

STREAM_ID=livestream
STREAM_livestream_CAMERA=/dev/video0
